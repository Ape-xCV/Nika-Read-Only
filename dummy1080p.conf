#https://tomverbeure.github.io/2019/08/03/Video-Timings-Calculator.html
Section "Device"
    Identifier  "DummyDevice"
    Driver      "dummy"
    VideoRam    8192
EndSection

Section "Monitor"
    Identifier   "DummyMonitor"
    HorizSync    15.0-25.0
    VertRefresh  15.0-25.0
    Modeline     "1920x1080" 52.5 1920 1968 2160 2400 1080 1083 1088 1096
EndSection

Section "Screen"
    Identifier    "1080p"
    Device        "DummyDevice"
    Monitor       "DummyMonitor"
    DefaultDepth  16
    SubSection "Display"
        Depth  16
        Modes  "1920x1080"
    EndSubSection
EndSection
